name: 24-7 Telegram Forward Bot Engine

# 🎯 THE PERMANENT FIX: Automatically kills the old instance when a new one triggers
concurrency:
  group: telegram-bot-runtime
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 */6 * * *' # Auto-restarts every 6 hours to prevent GitHub timeouts
  workflow_dispatch:      # Allows you to manual start/restart anytime
  push:
    branches:
      - main              # Restarts automatically when you update code

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install python-telegram-bot python-dotenv

      - name: Run Bot Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPER_ADMIN_ID: ${{ secrets.SUPER_ADMIN_ID }}
          MASTER_GROUP_ID: ${{ secrets.MASTER_GROUP_ID }}
          DATABASE_CHANNEL_ID: ${{ secrets.DATABASE_CHANNEL_ID }}
          TOPIC_MAPPINGS: ${{ secrets.TOPIC_MAPPINGS }}
        run: python app.py
