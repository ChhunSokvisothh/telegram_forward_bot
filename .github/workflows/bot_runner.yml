name: 24-7 Telegram Forward Bot Engine

concurrency:
  group: telegram-bot-runtime
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install python-telegram-bot python-dotenv aiohttp

      - name: Run Bot Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPER_ADMIN_ID: ${{ secrets.SUPER_ADMIN_ID }}
          MASTER_GROUP_ID: ${{ secrets.MASTER_GROUP_ID }}
          DATABASE_CHANNEL_ID: ${{ secrets.DATABASE_CHANNEL_ID }}
          TOPIC_MAPPINGS: ${{ secrets.TOPIC_MAPPINGS }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python app.py
