name: Weekly Cloud Sync & Auto-Delete

on:
  schedule:
    # ⏱️ Runs automatically every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows you to trigger the backup manually anytime

jobs:
  backup-and-rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Backup & Data Rotation Engine
        run: |
          cat << 'EOF' > rotate_logs.py
          import os
          import csv
          import glob
          from datetime import datetime, timedelta

          def main():
              today = datetime.now()
              cutoff_date = today - timedelta(days=90) # 🗓️ 3-Month Retention Horizon
              
              master_file = "master_historical_ledger.csv"
              file_exists = os.path.isfile(master_file)
              
              # Read existing entries to prevent duplication loops
              existing_ids = set()
              if file_exists:
                  with open(master_file, mode='r', encoding='utf-8') as f:
                      reader = csv.reader(f)
                      next(reader, None) # Skip header
                      for row in reader:
                          if len(row) > 1:
                              existing_ids.add(row[1]) # Track Transaction IDs

              new_rows = []
              print("🔍 Scanning local workspace for daily ledger files...")
              
              # Find all daily ledger csv files generated by app.py
              daily_files = glob.glob("daily_ledger_*.csv")
              
              for file_path in daily_files:
                  # Extract date from filename (e.g., daily_ledger_2026-07-03.csv)
                  try:
                      date_str = file_path.replace("daily_ledger_", "").replace(".csv", "")
                      file_date = datetime.strptime(date_str, "%Y-%m-%d")
                  except Exception:
                      continue
                      
                  # Automatically skip files older than 3 months to keep repo light
                  if file_date < cutoff_date:
                      print(f"🗑️ Skipping outdated file (Older than 90 days): {file_path}")
                      try:
                          os.remove(file_path)
                      except:
                          pass
                      continue

                  # Read transactions from valid files
                  with open(file_path, mode='r', encoding='utf-8-sig') as f:
                      reader = csv.reader(f)
                      next(reader, None) # Skip header
                      for row in reader:
                          if len(row) >= 9:
                              tx_id = row[1].replace('="', '').replace('"', '').strip()
                              if tx_id not in existing_ids:
                                  new_rows.append(row)

              # Append new unique records to master historical ledger
              if new_rows:
                  with open(master_file, mode='a', newline='', encoding='utf-8-sig') as f:
                      writer = csv.writer(f)
                      if not file_exists:
                          writer.writerow([
                              "Date", "Transaction ID", "Customer Name", 
                              "USD Total", "USD Transaction Count", 
                              "KHR Total", "KHR Transaction Count", 
                              "Transaction Count", "Salesperson"
                          ])
                      writer.writerows(new_rows)
                  print(f"✅ Successfully compiled {len(new_rows)} new rows into the historical archive.")
              else:
                  print("✨ Archive up to date. No new records found.")

          if __name__ == "__main__":
              main()
          EOF
          python rotate_logs.py
          rm rotate_logs.py

      - name: Commit and Push Rotated Ledger Back to GitHub
        run: |
          git config --global user.name "Automated Ledger Bot"
          git config --global user.email "bot@github.com"
          git add master_historical_ledger.csv
          git diff-index --quiet HEAD || git commit -m "📊 Weekly automated log append & 90-day retention cleanup [skip ci]"
          git push origin main
